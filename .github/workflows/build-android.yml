name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: OpenClaw ref to build
        required: false
        default: main
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

concurrency:
  group: android-release
  cancel-in-progress: false

env:
  SOURCE_REPO: openclaw/openclaw
  SOURCE_REF: ${{ github.event.inputs.source_ref || 'main' }}
  SOURCE_DIR: openclaw
  ANDROID_DIR: openclaw/apps/android
  RELEASE_TAG: android-latest
  RELEASE_NAME: Android latest

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_REF }}
          path: ${{ env.SOURCE_DIR }}
          fetch-depth: 1

      - name: Verify Android project exists
        run: |
          set -euo pipefail
          test -d "${ANDROID_DIR}"
          test -f "${ANDROID_DIR}/gradlew"
          test -f "${ANDROID_DIR}/app/build.gradle.kts"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Normalize Android SDK environment
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$SDK_ROOT"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$SDK_ROOT/platform-tools" >> "$GITHUB_PATH"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null

      - name: Install required Android SDK packages
        run: |
          set -euo pipefail
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" >/dev/null

      - name: Make gradlew executable
        working-directory: ${{ env.ANDROID_DIR }}
        run: chmod +x ./gradlew

      - name: Build release APK
        working-directory: ${{ env.ANDROID_DIR }}
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: ./gradlew --no-daemon :app:assembleRelease

      - name: Resolve APK path
        id: apk
        working-directory: ${{ env.ANDROID_DIR }}
        run: |
          set -euo pipefail
          APK_REL="$(find app/build/outputs/apk/release -type f -name '*release*.apk' | sort | tail -n1)"
          test -n "$APK_REL"
          test -f "$APK_REL"
          APK_NAME="$(basename "$APK_REL")"
          echo "apk_rel=$APK_REL" >> "$GITHUB_OUTPUT"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_repo_path=${ANDROID_DIR}/$APK_REL" >> "$GITHUB_OUTPUT"

      - name: Validate APK
        working-directory: ${{ env.ANDROID_DIR }}
        run: |
          set -euo pipefail
          ls -lah "${{ steps.apk.outputs.apk_rel }}"
          unzip -t "${{ steps.apk.outputs.apk_rel }}"

      - name: Compute checksum
        id: metadata
        working-directory: ${{ env.ANDROID_DIR }}
        run: |
          set -euo pipefail
          APK="${{ steps.apk.outputs.apk_rel }}"
          SHA256="$(sha256sum "$APK" | awk '{print $1}')"
          SIZE_BYTES="$(stat -c%s "$APK")"
          {
            echo "$SHA256  $(basename "$APK")"
          } > "${{ steps.apk.outputs.apk_name }}.sha256"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$SIZE_BYTES" >> "$GITHUB_OUTPUT"

      - name: Write release notes body
        working-directory: ${{ env.ANDROID_DIR }}
        run: |
          set -euo pipefail
          cat > release-body.md <<EOF_BODY
          Built from commit: ${GITHUB_SHA}

          - Source repo: ${SOURCE_REPO}
          - Source ref: ${SOURCE_REF}
          - Variant: release
          - APK: ${{ steps.apk.outputs.apk_name }}
          - Size: ${{ steps.metadata.outputs.size_bytes }} bytes
          - SHA-256: ${{ steps.metadata.outputs.sha256 }}
          - Workflow run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          - APK download: https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${{ steps.apk.outputs.apk_name }}
          - Checksum download: https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${{ steps.apk.outputs.apk_name }}.sha256
          EOF_BODY

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-release
          path: |
            ${{ steps.apk.outputs.apk_repo_path }}
            ${{ env.ANDROID_DIR }}/${{ steps.apk.outputs.apk_name }}.sha256
            ${{ env.ANDROID_DIR }}/release-body.md
          if-no-files-found: error
          compression-level: 0

      - name: Publish rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body_path: ${{ env.ANDROID_DIR }}/release-body.md
          make_latest: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.apk.outputs.apk_repo_path }}
            ${{ env.ANDROID_DIR }}/${{ steps.apk.outputs.apk_name }}.sha256
